# pr-monitor.localhost — reverse proxy to Flask web UI
# Managed by install.sh — do not edit directly; edit the source in apache/ and re-run.

<VirtualHost *:80>
    ServerName pr-monitor.localhost

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:7842/
    ProxyPassReverse / http://127.0.0.1:7842/

    ErrorLog  /private/var/log/apache2/pr-monitor.error.log
    CustomLog /private/var/log/apache2/pr-monitor.access.log common
</VirtualHost>
