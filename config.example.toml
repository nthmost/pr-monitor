# pr-monitor configuration
# Copy to ~/.pr-monitor.toml, then add PRs with:
#   prctl.py add https://github.com/owner/repo/pull/42
# Or use the web UI: python3 web.py

refresh_interval = 30   # seconds between GitHub polls

# [[prs]]
# owner    = "your-org"
# repo     = "your-repo"
# number   = 42
# identity = "your-gh-username"
